spring:
  application:
    name: assignment

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: enrollment_user

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}