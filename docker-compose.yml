services:
  redis:
    image: redis:alpine
    container_name: redis_assignment
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    networks:
      - BE-A
    restart: always
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    container_name: mysql_assignment
    ports:
      - "13306:3306"
    env_file:
      - .env
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb.d:/docker-entrypoint-initdb.d
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-assignment_db}
      - MYSQL_USER=${MYSQL_USER:-user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-user_password}
    networks:
      - BE-A

  backend:
    build: .
    image: jhh0101/assignment:latest
    container_name: backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}

      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-assignment_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-user}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-user_password}
    deploy:
      resources:
        limits:
          memory: 450M
    networks:
      - BE-A
    depends_on:
      - redis
      - mysql
    restart: always

volumes:
  mysql_data:

networks:
  BE-A:
    driver: bridge